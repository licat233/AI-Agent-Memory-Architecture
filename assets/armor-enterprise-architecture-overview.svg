<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">ARMOR Enterprise Architecture Overview</title>
  <desc id="desc">Architecture overview of ARMOR Enterprise AI Workspace showing intake routing, runtime execution, governed vault tracks, proposal review, and conservative retrieval.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#132536" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#637788"/>
    </marker>
    <style>
      .bg{fill:#f7fafc}.title{font:800 38px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#102033}.sub{font:500 18px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#607181}
      .panel{fill:#fff;stroke:#d4dee7;stroke-width:2;rx:18;filter:url(#shadow)}.soft{fill:#eef7ff;stroke:#9bc4ec}.green{fill:#ecf8f1;stroke:#84caa3}.amber{fill:#fff7ea;stroke:#e2b36a}.red{fill:#fff0f0;stroke:#df9b9b}.teal{fill:#eaf8f7;stroke:#76bfbe}.slate{fill:#eef2f5;stroke:#c8d4dc}
      .h{font:800 23px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#102033}.t{font:600 16px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#334858}.s{font:600 13px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#627384}.line{fill:none;stroke:#637788;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .dash{fill:none;stroke:#8aa0b2;stroke-width:3;stroke-dasharray:8 8;stroke-linecap:round;marker-end:url(#arrow)}.lane{font:800 15px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#48606f}.tag{fill:#102033}.tagText{font:800 14px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1600" height="960"/>
  <text x="64" y="70" class="title">ARMOR Enterprise AI Workspace</text>
  <text x="64" y="104" class="sub">企业级长期记忆架构：把业务知识放进可治理、可审计、有来源支撑的 Vault</text>

  <rect class="panel soft" x="64" y="178" width="260" height="150"/>
  <text x="96" y="226" class="h">Business Inputs</text>
  <text x="96" y="264" class="t">用户请求 · 会议记录</text>
  <text x="96" y="292" class="t">产品/客户/规则/研究</text>

  <rect class="panel teal" x="404" y="150" width="300" height="206"/>
  <text x="438" y="198" class="h">Prompt Intake Router</text>
  <text x="438" y="236" class="t">1. Classify intent</text>
  <text x="438" y="266" class="t">2. Assess risk</text>
  <text x="438" y="296" class="t">3. Decide persistence level</text>
  <text x="438" y="326" class="s">Direct · Remember · Fix · Discussion · High risk</text>

  <rect class="panel slate" x="794" y="150" width="300" height="206"/>
  <text x="828" y="198" class="h">Trusted Agent Runtime</text>
  <text x="828" y="236" class="t">Read · Search · Patch · Write</text>
  <text x="828" y="266" class="t">Tools · MCP · Indexes</text>
  <text x="828" y="302" class="s">能力层，不是权威层</text>
  <text x="828" y="326" class="s">runtime memory 只可作为缓存/指针</text>

  <rect class="panel green" x="1190" y="122" width="338" height="658"/>
  <text x="1228" y="170" class="h">Governed ARMOR Vault</text>
  <text x="1228" y="200" class="s">Durable source of truth / audit layer</text>

  <rect class="panel" x="1228" y="230" width="260" height="112"/>
  <text x="1258" y="270" class="h">Authority Track</text>
  <text x="1258" y="302" class="t">00-Core · 01-Facts</text>
  <text x="1258" y="328" class="t">02-Rules · Reviewed</text>

  <rect class="panel" x="1228" y="370" width="260" height="112"/>
  <text x="1258" y="410" class="h">Capture Track</text>
  <text x="1258" y="442" class="t">Drafts · Inbox · Logs</text>
  <text x="1258" y="468" class="t">Raw Research · Projects</text>

  <rect class="panel" x="1228" y="510" width="260" height="92"/>
  <text x="1258" y="550" class="h">Records</text>
  <text x="1258" y="582" class="t">Evidence only, append-first</text>

  <rect class="panel amber" x="1228" y="630" width="260" height="92"/>
  <text x="1258" y="670" class="h">Proposals</text>
  <text x="1258" y="702" class="t">Review high-authority edits</text>

  <rect class="panel amber" x="404" y="430" width="300" height="170"/>
  <text x="438" y="478" class="h">Memory Write Router</text>
  <text x="438" y="516" class="t">Extract → classify → confidence</text>
  <text x="438" y="546" class="t">Search SSOT → write lower</text>
  <text x="438" y="576" class="t">or create proposal</text>

  <rect class="panel red" x="794" y="430" width="300" height="170"/>
  <text x="828" y="478" class="h">Root-Cause Fix Protocol</text>
  <text x="828" y="516" class="t">Identify source layer</text>
  <text x="828" y="546" class="t">Fix source or propose fix</text>
  <text x="828" y="576" class="t">Log repair and verify</text>

  <rect class="panel" x="64" y="660" width="1030" height="146"/>
  <text x="96" y="708" class="h">Conservative Retrieval</text>
  <text x="96" y="746" class="t">Default answers prefer Core, Facts, Rules, reviewed insights, and active project context.</text>
  <text x="96" y="778" class="t">Drafts, logs, raw records, proposals, archives, and raw research are excluded as current truth by default.</text>

  <rect class="tag" x="64" y="848" width="650" height="52" rx="26"/>
  <text x="389" y="881" text-anchor="middle" class="tagText">Principle: Tools provide capability. Architecture defines permission. Vault remains durable memory.</text>

  <path class="line" d="M324 253 C358 253 370 253 404 253"/>
  <path class="line" d="M704 253 C738 253 760 253 794 253"/>
  <path class="line" d="M1094 253 C1132 253 1152 253 1190 253"/>
  <path class="line" d="M554 356 L554 430"/>
  <path class="line" d="M944 356 L944 430"/>
  <path class="line" d="M704 515 C894 515 1010 408 1190 408"/>
  <path class="line" d="M1094 515 C1138 552 1156 622 1190 676"/>
  <path class="dash" d="M1358 722 C1306 838 1012 842 780 733"/>
  <path class="dash" d="M1228 556 C1040 632 750 658 360 706"/>

  <text x="736" y="236" class="lane">execute</text>
  <text x="724" y="494" class="lane">remember</text>
  <text x="1106" y="566" class="lane">proposal</text>
  <text x="1008" y="716" class="lane">retrieval filter</text>
</svg>
