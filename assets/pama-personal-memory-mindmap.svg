<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">PAMA 个人 AI 记忆架构思维导图</title>
  <desc id="desc">A polished Chinese mind map of the PAMA Personal AI Memory Architecture.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#2b2438" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#28506a"/>
      <stop offset="100%" stop-color="#7a5670"/>
    </linearGradient>
    <style>
      .bg { fill: #fbfaf8; }
      .title { font: 800 40px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #231f2a; letter-spacing: 0; }
      .subtitle { font: 500 18px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #706a73; }
      .branch { fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: .92; }
      .card { fill: #ffffff; stroke-width: 2.5; rx: 18; filter: url(#shadow); }
      .cardTitle { font: 800 24px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #231f2a; letter-spacing: 0; }
      .item { font: 600 17px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #514b58; }
      .small { font: 600 14px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #716b75; }
      .centerTitle { font: 800 34px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #fff; letter-spacing: 0; }
      .centerSub { font: 600 17px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f1e9f0; }
      .pill { fill: #f0ede9; stroke: #d9d1ca; stroke-width: 1.5; }
      .pillText { font: 700 14px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #514b58; }
      .teal { stroke: #178c89; }
      .rose { stroke: #c45f70; }
      .gold { stroke: #be842b; }
      .green { stroke: #3a9764; }
      .plum { stroke: #7e5a91; }
      .blue { stroke: #396fa5; }
      .tealFill { stroke: #78c2bd; fill: #eaf8f5; }
      .roseFill { stroke: #dda0aa; fill: #fff0f3; }
      .goldFill { stroke: #e1bd74; fill: #fff8e8; }
      .greenFill { stroke: #8bcc9f; fill: #eff9f1; }
      .plumFill { stroke: #bda2c9; fill: #f7f0fa; }
      .blueFill { stroke: #90b4d7; fill: #eef7ff; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1080"/>
  <text x="70" y="76" class="title">PAMA 个人 AI 记忆架构</text>
  <text x="70" y="110" class="subtitle">个人现实、决策与认知演化操作系统：让记忆更诚实，而不是更庞大</text>

  <path class="branch teal" d="M800 520 C640 390 526 286 360 214"/>
  <path class="branch rose" d="M800 520 C964 390 1072 284 1240 212"/>
  <path class="branch gold" d="M800 520 C635 516 510 506 328 502"/>
  <path class="branch green" d="M800 520 C962 516 1086 510 1272 504"/>
  <path class="branch plum" d="M800 520 C638 664 520 788 360 862"/>
  <path class="branch blue" d="M800 520 C960 666 1080 790 1240 864"/>

  <g filter="url(#shadow)">
    <rect x="604" y="382" width="392" height="276" rx="30" fill="url(#centerGrad)"/>
    <text x="800" y="452" text-anchor="middle" class="centerTitle">PAMA</text>
    <text x="800" y="492" text-anchor="middle" class="centerTitle">Personal AI Memory</text>
    <text x="800" y="538" text-anchor="middle" class="centerSub">现实、注意力、决策、目标、真理</text>
    <text x="800" y="570" text-anchor="middle" class="centerSub">Truth is expensive</text>
    <text x="800" y="610" text-anchor="middle" class="centerSub">用户主权 + AI 反自欺</text>
  </g>

  <g>
    <rect class="card tealFill" x="88" y="124" width="450" height="232" rx="18"/>
    <text x="124" y="172" class="cardTitle">使命与反失败模式</text>
    <text x="124" y="212" class="item">• 不讨好用户，不记住每个念头</text>
    <text x="124" y="244" class="item">• 对抗自我美化叙事与确认偏误</text>
    <text x="124" y="276" class="item">• 校验口头优先级与真实注意力</text>
    <text x="124" y="308" class="item">• 保存现实、决策、目标、复盘、长期真理</text>
  </g>

  <g>
    <rect class="card roseFill" x="1068" y="122" width="448" height="238" rx="18"/>
    <text x="1104" y="170" class="cardTitle">最高治理原则</text>
    <text x="1104" y="210" class="item">• Reality &gt; Narrative：证据胜过故事</text>
    <text x="1104" y="242" class="item">• Behavior &gt; Declarations：行为胜过宣告</text>
    <text x="1104" y="274" class="item">• Store Lower：不确定先放低权层</text>
    <text x="1104" y="306" class="item">• User Sovereignty：用户保留最终决定权</text>
    <text x="1104" y="338" class="item">• Models Are Temporary：模型会衰减</text>
  </g>

  <g>
    <rect class="card goldFill" x="70" y="384" width="500" height="276" rx="18"/>
    <text x="106" y="432" class="cardTitle">个人 Vault 层级</text>
    <text x="106" y="472" class="item">• 00-Core：宪法、稳定架构、部署规则</text>
    <text x="106" y="504" class="item">• 01-Reality：客观事件、指标、结果、证据</text>
    <text x="106" y="536" class="item">• 02-Attention：时间与能量审计</text>
    <text x="106" y="568" class="item">• 03-Decisions / 04-Goals：选择与方向</text>
    <text x="106" y="600" class="item">• 05-Truth：少量、已验证、长期原则</text>
    <text x="106" y="632" class="item">• 06-Meta / 07-Reviews / 08-Working / Archive</text>
  </g>

  <g>
    <rect class="card greenFill" x="1036" y="386" width="500" height="266" rx="18"/>
    <text x="1072" y="434" class="cardTitle">记忆晋升流水线</text>
    <text x="1072" y="474" class="item">• Conversation：当前交互，默认不长期保存</text>
    <text x="1072" y="506" class="item">• 08-Working-Memory：快速缓存、低置信度</text>
    <text x="1072" y="538" class="item">• 07-Reviews：证据检查、注意力审计、决策反馈</text>
    <text x="1072" y="570" class="item">• 01-Reality / 03-Decisions / 05-Truth</text>
    <text x="1072" y="610" class="item">• 只有证据足以支撑权威时，才晋升</text>
  </g>

  <g>
    <rect class="card plumFill" x="82" y="750" width="486" height="238" rx="18"/>
    <text x="118" y="798" class="cardTitle">写入前自检</text>
    <text x="118" y="838" class="item">• 这是客观现实、解释、临时想法还是长期真理？</text>
    <text x="118" y="870" class="item">• 有什么证据支持？是否仍应低权保存？</text>
    <text x="118" y="902" class="item">• 是否会影响未来决策或行为？</text>
    <text x="118" y="934" class="item">• 是否需要等周/月复盘再晋升？</text>
  </g>

  <g>
    <rect class="card blueFill" x="1042" y="750" width="486" height="238" rx="18"/>
    <text x="1078" y="798" class="cardTitle">运行时边界</text>
    <text x="1078" y="838" class="item">• Runtime 是执行器，不是个人真理权威</text>
    <text x="1078" y="870" class="item">• 可保存 session、task state、cache、短指针</text>
    <text x="1078" y="902" class="item">• 不得保存长期偏好、身份断言、目标、决策</text>
    <text x="1078" y="934" class="item">• Fix 事件要修源头，不能写 memory 补丁</text>
  </g>

  <g>
    <rect class="pill" x="566" y="706" width="468" height="48" rx="24"/>
    <text x="800" y="737" text-anchor="middle" class="pillText">最终原则：PAMA 让记忆更诚实，帮助用户看清现实，同时保留用户主权</text>
  </g>
</svg>
