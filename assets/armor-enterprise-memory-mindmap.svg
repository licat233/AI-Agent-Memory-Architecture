<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">ARMOR 企业 AI 记忆架构思维导图</title>
  <desc id="desc">A polished Chinese mind map of the ARMOR Enterprise AI Workspace memory architecture.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1d2a36" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17324d"/>
      <stop offset="100%" stop-color="#2e6b73"/>
    </linearGradient>
    <style>
      .bg { fill: #f7faf9; }
      .title { font: 800 40px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #14212d; letter-spacing: 0; }
      .subtitle { font: 500 18px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #61717d; }
      .branch { fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: .92; }
      .card { fill: #ffffff; stroke-width: 2.5; rx: 18; filter: url(#shadow); }
      .cardTitle { font: 800 24px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #17202a; letter-spacing: 0; }
      .item { font: 600 17px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #41515d; }
      .small { font: 600 14px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #62727e; }
      .centerTitle { font: 800 34px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #fff; letter-spacing: 0; }
      .centerSub { font: 600 17px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #d8edf0; }
      .pill { fill: #eef3f2; stroke: #d6e1df; stroke-width: 1.5; }
      .pillText { font: 700 14px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #40525d; }
      .blue { stroke: #3478b9; }
      .green { stroke: #279868; }
      .amber { stroke: #c78328; }
      .red { stroke: #c85656; }
      .teal { stroke: #168b8e; }
      .violet { stroke: #7b67a8; }
      .blueFill { stroke: #80acd6; fill: #eef7ff; }
      .greenFill { stroke: #80c9a2; fill: #effaf3; }
      .amberFill { stroke: #e2b369; fill: #fff7ea; }
      .redFill { stroke: #df9b9b; fill: #fff1f1; }
      .tealFill { stroke: #76bfbe; fill: #eaf8f7; }
      .violetFill { stroke: #b4a2d2; fill: #f5f1fb; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1080"/>
  <text x="70" y="76" class="title">ARMOR 企业 AI 记忆架构</text>
  <text x="70" y="110" class="subtitle">企业级、可审计、有来源支撑的 AI Workspace 记忆治理图</text>

  <path class="branch blue" d="M800 520 C640 400 520 292 360 224"/>
  <path class="branch green" d="M800 520 C968 390 1080 288 1240 220"/>
  <path class="branch amber" d="M800 520 C640 520 510 510 330 510"/>
  <path class="branch red" d="M800 520 C968 520 1092 516 1270 512"/>
  <path class="branch teal" d="M800 520 C640 660 520 786 358 860"/>
  <path class="branch violet" d="M800 520 C962 672 1082 792 1238 862"/>

  <g filter="url(#shadow)">
    <rect x="610" y="385" width="380" height="270" rx="28" fill="url(#centerGrad)"/>
    <text x="800" y="455" text-anchor="middle" class="centerTitle">ARMOR</text>
    <text x="800" y="494" text-anchor="middle" class="centerTitle">Enterprise AI Workspace</text>
    <text x="800" y="540" text-anchor="middle" class="centerSub">Vault 是长期事实源</text>
    <text x="800" y="572" text-anchor="middle" class="centerSub">Runtime 只是执行能力层</text>
    <text x="800" y="612" text-anchor="middle" class="centerSub">记忆目标：治理、审计、可复核</text>
  </g>

  <g>
    <rect class="card blueFill" x="90" y="130" width="430" height="210" rx="18"/>
    <text x="126" y="178" class="cardTitle">核心原则</text>
    <text x="126" y="218" class="item">• SSOT：每个业务真相只有一个权威位置</text>
    <text x="126" y="250" class="item">• Capture ≠ Authority：写下不等于事实</text>
    <text x="126" y="282" class="item">• Capability ≠ Permission：能写不代表可写</text>
    <text x="126" y="314" class="item">• Conservative Retrieval：默认排除低权材料</text>
  </g>

  <g>
    <rect class="card greenFill" x="1080" y="126" width="430" height="230" rx="18"/>
    <text x="1116" y="174" class="cardTitle">系统角色</text>
    <text x="1116" y="214" class="item">• Human Owner：审批高风险提案</text>
    <text x="1116" y="246" class="item">• AI Agent：检索、分类、总结、提案、写入</text>
    <text x="1116" y="278" class="item">• Agent Runtime：文件、工具、搜索、索引能力</text>
    <text x="1116" y="310" class="item">• Vault：存储、治理、图谱、审计、复核</text>
  </g>

  <g>
    <rect class="card amberFill" x="70" y="394" width="488" height="246" rx="18"/>
    <text x="106" y="442" class="cardTitle">双轨运行模型</text>
    <text x="106" y="482" class="item">• Capture Track：90-Drafts / 91-Inbox / Logs</text>
    <text x="126" y="512" class="small">快速捕获、保留证据、排队复核，默认低权威</text>
    <text x="106" y="552" class="item">• Authority Track：00-Core / 01-Facts / 02-Rules</text>
    <text x="126" y="582" class="small">存放当前真相、规则、已审查研究、验证经验</text>
    <text x="106" y="616" class="item">• 低权材料不能自动进入当前事实检索</text>
  </g>

  <g>
    <rect class="card redFill" x="1046" y="386" width="486" height="260" rx="18"/>
    <text x="1082" y="434" class="cardTitle">权限与治理补丁</text>
    <text x="1082" y="474" class="item">• Class A：Core / Facts / Rules，需提案或人审</text>
    <text x="1082" y="506" class="item">• Class B：Insights / Reviewed Research / Projects</text>
    <text x="1082" y="538" class="item">• Class C：Drafts / Inbox / Logs，可快速写入</text>
    <text x="1082" y="570" class="item">• Class R：Records，仅追加证据，不自动成事实</text>
    <text x="1082" y="610" class="item">• High / Medium / Low / No Memory 决定去向</text>
  </g>

  <g>
    <rect class="card tealFill" x="86" y="748" width="480" height="230" rx="18"/>
    <text x="122" y="796" class="cardTitle">路由与写入流水线</text>
    <text x="122" y="836" class="item">• Prompt Intake：先分类意图、风险、持久化等级</text>
    <text x="122" y="868" class="item">• Remember：进入 Memory Write Router</text>
    <text x="122" y="900" class="item">• Fix：进入 Root-Cause Fix Protocol</text>
    <text x="122" y="932" class="item">• 写入前：extract → classify → confidence → SSOT</text>
  </g>

  <g>
    <rect class="card violetFill" x="1058" y="750" width="460" height="230" rx="18"/>
    <text x="1094" y="798" class="cardTitle">检索、生命周期、维护</text>
    <text x="1094" y="838" class="item">• 默认检索：Core / Facts / Rules / Reviewed</text>
    <text x="1094" y="870" class="item">• 默认排除：Drafts / Logs / Proposals / Archive</text>
    <text x="1094" y="902" class="item">• 生命周期：过期、归档、提醒、复核</text>
    <text x="1094" y="934" class="item">• 目标：低维护、可追溯、知识债可见</text>
  </g>

  <g>
    <rect class="pill" x="598" y="706" width="404" height="48" rx="24"/>
    <text x="800" y="737" text-anchor="middle" class="pillText">最终原则：不是记住一切，而是保存有来源、可治理、可复核的业务记忆</text>
  </g>
</svg>
