<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">PAMA Personal Architecture Overview</title>
  <desc id="desc">Architecture overview of PAMA Personal AI Memory Architecture showing conversation intake, working memory, review gate, reality, attention, decisions, goals, truth, meta, and archive layers.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#29243a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#746a7c"/>
    </marker>
    <style>
      .bg{fill:#fbfaf8}.title{font:800 38px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#231f2a}.sub{font:500 18px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#706a74}
      .panel{fill:#fff;stroke:#ddd7d2;stroke-width:2;rx:18;filter:url(#shadow)}.teal{fill:#eaf8f5;stroke:#78c2bd}.rose{fill:#fff0f3;stroke:#dda0aa}.gold{fill:#fff8e8;stroke:#e1bd74}.green{fill:#eff9f1;stroke:#8bcc9f}.plum{fill:#f7f0fa;stroke:#bda2c9}.blue{fill:#eef7ff;stroke:#90b4d7}.gray{fill:#f0ede9;stroke:#d5cec8}
      .h{font:800 23px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#231f2a}.t{font:600 16px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#514b58}.s{font:600 13px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#746e77}
      .line{fill:none;stroke:#746a7c;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.dash{fill:none;stroke:#978c9e;stroke-width:3;stroke-dasharray:8 8;stroke-linecap:round;marker-end:url(#arrow)}
      .lane{font:800 15px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#65596e}.tag{fill:#231f2a}.tagText{font:800 14px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1600" height="960"/>
  <text x="64" y="70" class="title">PAMA Personal AI Memory Architecture</text>
  <text x="64" y="104" class="sub">个人现实、决策与认知演化操作系统：让 AI 记忆更诚实，而不是更庞大</text>

  <rect class="panel teal" x="64" y="178" width="250" height="142"/>
  <text x="94" y="226" class="h">Conversation</text>
  <text x="94" y="264" class="t">当前对话 · 临时任务</text>
  <text x="94" y="292" class="s">默认不自动长期保存</text>

  <rect class="panel blue" x="386" y="150" width="280" height="198"/>
  <text x="420" y="198" class="h">PAMA Intake Router</text>
  <text x="420" y="236" class="t">意图 · 风险 · 持久化</text>
  <text x="420" y="266" class="t">Direct / Remember / Fix</text>
  <text x="420" y="296" class="s">模糊高风险先澄清</text>
  <text x="420" y="320" class="s">不把永久记忆写进 runtime cache</text>

  <rect class="panel gold" x="738" y="150" width="300" height="198"/>
  <text x="772" y="198" class="h">08-Working-Memory</text>
  <text x="772" y="236" class="t">高频写入 · 低权威</text>
  <text x="772" y="266" class="t">想法 / 草稿 / 不确定候选</text>
  <text x="772" y="296" class="s">Store lower when uncertain</text>
  <text x="772" y="320" class="s">Memory-Candidates fallback</text>

  <rect class="panel plum" x="1112" y="150" width="330" height="198"/>
  <text x="1146" y="198" class="h">07-Reviews</text>
  <text x="1146" y="236" class="t">证据检查 · 注意力审计</text>
  <text x="1146" y="266" class="t">决策反馈 · 置信度复核</text>
  <text x="1146" y="296" class="s">Truth is expensive</text>
  <text x="1146" y="320" class="s">Promotion gate before durable truth</text>

  <rect class="panel green" x="134" y="452" width="260" height="132"/>
  <text x="166" y="500" class="h">01-Reality</text>
  <text x="166" y="538" class="t">客观事件 · 指标 · 结果</text>
  <text x="166" y="566" class="s">evidence-backed logs</text>

  <rect class="panel rose" x="458" y="452" width="260" height="132"/>
  <text x="490" y="500" class="h">02-Attention</text>
  <text x="490" y="538" class="t">时间与能量流向</text>
  <text x="490" y="566" class="s">behavior beats declarations</text>

  <rect class="panel blue" x="782" y="452" width="260" height="132"/>
  <text x="814" y="500" class="h">03-Decisions</text>
  <text x="814" y="538" class="t">重大选择与反馈</text>
  <text x="814" y="566" class="s">prediction / outcome / lesson</text>

  <rect class="panel teal" x="1106" y="452" width="260" height="132"/>
  <text x="1138" y="500" class="h">04-Goals</text>
  <text x="1138" y="538" class="t">长期方向 · 短期战术</text>
  <text x="1138" y="566" class="s">linked to review cadence</text>

  <rect class="panel green" x="296" y="668" width="300" height="142"/>
  <text x="330" y="716" class="h">05-Truth</text>
  <text x="330" y="754" class="t">少量、验证、长期有效</text>
  <text x="330" y="782" class="s">durable principles / preferences / SSOT</text>

  <rect class="panel gray" x="650" y="668" width="300" height="142"/>
  <text x="684" y="716" class="h">06-Meta</text>
  <text x="684" y="754" class="t">假设、解释、身份模型</text>
  <text x="684" y="782" class="s">confidence / evidence / last_review</text>

  <rect class="panel gray" x="1004" y="668" width="300" height="142"/>
  <text x="1038" y="716" class="h">99-Archive</text>
  <text x="1038" y="754" class="t">失效、过期、被替代</text>
  <text x="1038" y="782" class="s">explicit recall only</text>

  <rect class="panel rose" x="64" y="668" width="170" height="142"/>
  <text x="96" y="716" class="h">User</text>
  <text x="96" y="754" class="t">主权</text>
  <text x="96" y="782" class="s">final authority</text>

  <rect class="tag" x="390" y="862" width="822" height="52" rx="26"/>
  <text x="801" y="895" text-anchor="middle" class="tagText">Principle: Reality wins. Behavior calibrates goals. Truth stays rare. User sovereignty remains final.</text>

  <path class="line" d="M314 249 C346 249 354 249 386 249"/>
  <path class="line" d="M666 249 C700 249 704 249 738 249"/>
  <path class="line" d="M1038 249 C1070 249 1080 249 1112 249"/>
  <path class="line" d="M1277 348 C1256 394 1238 418 1236 452"/>
  <path class="line" d="M1190 348 C1074 412 942 432 912 452"/>
  <path class="line" d="M1140 348 C918 404 652 424 588 452"/>
  <path class="line" d="M1160 348 C874 394 384 424 264 452"/>
  <path class="line" d="M446 584 C446 622 446 630 446 668"/>
  <path class="line" d="M800 584 C800 622 800 630 800 668"/>
  <path class="dash" d="M950 739 C990 739 964 739 1004 739"/>
  <path class="dash" d="M234 739 C252 739 272 739 296 739"/>
  <path class="dash" d="M596 739 C618 739 628 739 650 739"/>

  <text x="346" y="232" class="lane">classify</text>
  <text x="690" y="232" class="lane">capture</text>
  <text x="1054" y="232" class="lane">review</text>
  <text x="1000" y="420" class="lane">promote with evidence</text>
  <text x="250" y="720" class="lane">sovereignty</text>
  <text x="610" y="720" class="lane">hypothesis</text>
  <text x="960" y="720" class="lane">decay</text>
</svg>
